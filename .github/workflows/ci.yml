name: ML System CI Pipeline

# Trigger pipeline on push or pull request to main branch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  build-test:
    runs-on: ubuntu-latest

    steps:

      # Checkout repository code
      - name: Checkout repo
        uses: actions/checkout@v4

      # Setup Python environment
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Install project dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Run unit tests
      - name: Run tests
        run: |
          PYTHONPATH=$PWD python -m pytest tests/

      # Build Docker image
      - name: Build docker
        run: |
          docker build -t enterprise-ml-system -f docker/Dockerfile .